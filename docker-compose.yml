services:
  postgres:
    image: postgres:16-alpine
    container_name: orbit-postgres
    environment:
      POSTGRES_USER: orbit
      POSTGRES_PASSWORD: orbit
      POSTGRES_DB: orbit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # On first boot, create the `keycloak` database so the Keycloak service
      # has somewhere to land. Idempotent — scripts in /docker-entrypoint-initdb.d
      # only run when the data volume is empty.
      - ./infra/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbit -d orbit"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: orbit-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: orbit-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
    ports:
      - "9092:9092"     # Kafka (host)
      - "29092:29092"   # Kafka (inside docker network)
      - "9644:9644"     # Admin API
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: orbit-redpanda-console
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8080:8080"

  localstack:
    image: localstack/localstack:3
    container_name: orbit-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,secretsmanager,sqs,sns
      DEBUG: 0
      PERSISTENCE: 1
      AWS_DEFAULT_REGION: ap-northeast-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Keycloak — IdP for the admin console only. Customer auth still uses our
  # own JWT in apps/api. Bundled with realm-export.json so a fresh `pnpm setup`
  # produces a logged-in-able admin user without manual configuration.
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: orbit-keycloak
    command:
      - start-dev
      - --import-realm
      - --health-enabled=true
    environment:
      # Keycloak 25 uses KEYCLOAK_ADMIN / KEYCLOAK_ADMIN_PASSWORD for the
      # initial master-realm admin (only consumed on first boot).
      # KC_BOOTSTRAP_ADMIN_USERNAME / _PASSWORD is the Keycloak 26+ variant —
      # if you upgrade the image, swap to those names.
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: orbit
      KC_DB_PASSWORD: orbit
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Keycloak 25 exposes /health/ready on the management interface (9000)
      # but for simplicity we hit the OIDC discovery endpoint which proves
      # the realm is loaded.
      test:
        - CMD-SHELL
        - "curl -fsS http://localhost:8080/realms/orbit/.well-known/openid-configuration > /dev/null"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  postgres_data:
  localstack_data:
  redpanda_data:
